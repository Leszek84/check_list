version: '3.8'
services:
  backend:
    build: ./Backend
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DB_CONNECTION_STRING=Server=db;Database=TasksDb;User Id=sa;Password=StrongPassword123!;TrustServerCertificate=True
    depends_on:
      - db

  frontend:
    build: ./Frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

  db:
    image: mcr.microsoft.com/azure-sql-edge
    container_name: cloud-db
    restart: always
    environment:
      SA_PASSWORD: "StrongPassword123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sql-data:/var/opt/mssql

volumes:
  sql-data: